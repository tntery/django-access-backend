{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Access Control is a user-friendly web application designed to manage and control access permissions for users in an organization. With an intuitive interface, it allows administrators to easily assign and modify access rights, ensuring secure and efficient management of resources. Whether it's for physical access to facilities or digital access to systems, Smart Access Control provides a centralized solution for maintaining security and streamlining access management processes.">
    <meta name="keywords" content="access control, user management, permissions, security, access rights, resource management, access permissions, user access control, access management system">
    <title>{% block title %}Smart Access Control{% endblock %}</title>
    <link rel="shortcut icon" href="{% static 'access/img/favicon.png' %}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    {% block extra_head %}{% endblock %}

</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-secondary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'access/img/smart-access-control-logo.png' %}" alt="smart-access-control-logo" width="200" height="60">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <div class="ms-auto mt-3 mt-lg-0 d-grid d-lg-block">
                    <a href="{% url 'settings' %}" class="btn btn-sm btn-outline-dark w-100 w-lg-auto">
                        <i class="bi bi-sliders2-vertical me-1"></i>
                        Settings
                    </a>
                </div>
            </div>
        </div>
    </nav>

    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    {% block extra_scripts %}{% endblock %}

</body>
</html>
