{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Access Control{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    {% block extra_head %}{% endblock %}

</head>
<body>

    <nav class="navbar bg-body-secondary d-flex">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'access/img/smart-access-control-logo.png' %}" alt="smart-access-control-logo" width="200" height="60">
            </a>
            <div class="ms-auto">
                <a href="{% url 'settings' %}" class="btn btn-sm btn-outline-dark">
                    <i class="bi bi-sliders2-vertical me-1"></i>
                    Settings
                </a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
